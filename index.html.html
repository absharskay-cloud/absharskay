<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شركة ذكاء النسور للاستثمار - بقيادة جميل جمال شمسان</title>
    <!-- خطوط جوجل العربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ============================================================
           التنسيقات الأساسية والمتغيرات وتأثيرات العصر الحديث
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b1120;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        :root {
            --gold: #fbbf24;
            --gold-dark: #d97706;
            --blue-glow: #38bdf8;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1120;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* خلفية متحركة (أشكال هندسية) للقسم الرئيسي */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: floatShape 18s infinite alternate ease-in-out;
        }
        .shape:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #fbbf24;
            top: -15%;
            right: -10%;
            animation-delay: 0s;
        }
        .shape:nth-child(2) {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            bottom: -15%;
            left: -10%;
            animation-delay: -6s;
        }
        .shape:nth-child(3) {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            top: 40%;
            left: 40%;
            animation-delay: -12s;
        }
        @keyframes floatShape {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(40px, -40px) scale(1.3);
            }
        }

        /* تأثير التلاشي عند التمرير */
        .fade-section {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .fade-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* تأثير الزجاج (Glassmorphism) */
        .glass {
            background: rgba(30, 41, 59, 0.35);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(251, 191, 36, 0.12);
        }

        /* النص المتدرج الذهبي */
        .text-gradient {
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* الزر الذهبي */
        .btn-gold {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #0b1120;
            font-weight: 700;
            padding: 14px 36px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.25);
            border: none;
            cursor: pointer;
            display: inline-block;
        }
        .btn-gold:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.5);
        }

        /* البطاقات */
        .card-modern {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(251, 191, 36, 0.08);
            border-radius: 24px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
        }
        .card-modern:hover {
            transform: translateY(-12px) scale(1.01);
            border-color: #fbbf24;
            box-shadow: 0 25px 50px -12px rgba(251, 191, 36, 0.25);
        }

        /* روابط التنقل */
        .nav-link {
            position: relative;
            color: #94a3b8;
            transition: color 0.3s;
            font-weight: 600;
            padding-bottom: 4px;
        }
        .nav-link:hover {
            color: #fbbf24;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: 0;
            right: 0;
            background: #fbbf24;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }

        /* بطاقات المعلومات (العناوين) */
        .info-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(251, 191, 36, 0.12);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
        }
        .info-card:hover {
            border-color: #fbbf24;
            transform: translateY(-6px);
            background: rgba(251, 191, 36, 0.05);
        }

        /* ============================================================
           خلفية العلامة المائية للشعار (Watermark)
           سيتم تطبيقها على قسم Hero عبر الـ Inline Style في React
           ============================================================ */
        .watermark-bg {
            background-size: 40% auto;
            background-repeat: no-repeat;
            background-position: center 30%;
            opacity: 0.08;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // =========================================================
        //  المكونات الرئيسية لموقع شركة ذكاء النسور (React JSX)
        // =========================================================

        const { useState, useEffect, useRef } = React;

        // ----- 1. مكون الرأس (Header) -----
        function Header() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            return (
                <header className="fixed top-0 left-0 right-0 z-50 glass border-b border-[#fbbf24]/10 transition-all duration-300">
                    <div className="container mx-auto px-4 md:px-8 py-3 flex justify-between items-center">
                        {/* الشعار */}
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-full bg-gradient-to-br from-[#fbbf24] to-[#d97706] flex items-center justify-center shadow-lg shadow-[#fbbf24]/30 overflow-hidden flex-shrink-0">
                                <img
                                    src="logo.png"
                                    alt="شعار ذكاء النسور"
                                    className="w-full h-full object-cover"
                                />
                            </div>
                            <div>
                                <h1 className="text-xl md:text-2xl font-extrabold tracking-tight leading-tight">
                                    <span className="text-white">ذكاء</span>
                                    <span className="text-gradient">النسور</span>
                                </h1>
                                <p className="text-[10px] md:text-xs text-[#94a3b8] -mt-1">الرئيس: <span className="text-[#fbbf24]">جميل جمال شمسان</span></p>
                            </div>
                        </div>

                        {/* روابط سطح المكتب */}
                        <nav className="hidden lg:flex items-center gap-8">
                            <a href="#about" className="nav-link text-sm">من نحن</a>
                            <a href="#services" className="nav-link text-sm">خدماتنا</a>
                            <a href="#projects" className="nav-link text-sm">مشاريعنا</a>
                            <a href="#blog" className="nav-link text-sm">المدونة</a>
                            <a href="#contact" className="nav-link text-sm">اتصل بنا</a>
                            <button className="btn-gold text-sm">استشارة مجانية</button>
                        </nav>

                        {/* زر القائمة للجوال */}
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="lg:hidden text-white focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={isMenuOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"} />
                            </svg>
                        </button>
                    </div>

                    {/* القائمة المنبثقة للجوال */}
                    {isMenuOpen && (
                        <div className="lg:hidden bg-[#1e293b]/95 backdrop-blur-xl border-t border-[#fbbf24]/10 p-6 flex flex-col gap-4 text-center">
                            <a href="#about" className="nav-link text-lg" onClick={() => setIsMenuOpen(false)}>من نحن</a>
                            <a href="#services" className="nav-link text-lg" onClick={() => setIsMenuOpen(false)}>خدماتنا</a>
                            <a href="#projects" className="nav-link text-lg" onClick={() => setIsMenuOpen(false)}>مشاريعنا</a>
                            <a href="#blog" className="nav-link text-lg" onClick={() => setIsMenuOpen(false)}>المدونة</a>
                            <a href="#contact" className="nav-link text-lg" onClick={() => setIsMenuOpen(false)}>اتصل بنا</a>
                            <button className="btn-gold w-full">استشارة مجانية</button>
                        </div>
                    )}
                </header>
            );
        }

        // ----- 2. القسم الرئيسي (Hero) مع خلفية الشعار كعلامة مائية -----
        function Hero() {
            // إضافة خلفية العلامة المائية للشعار (Watermark)
            const watermarkStyle = {
                backgroundImage: "url('logo.png')", // 🟢 ضع اسم ملف الشعار هنا
                backgroundSize: '35% auto',
                backgroundRepeat: 'no-repeat',
                backgroundPosition: 'center 40%',
                opacity: 0.08,
                position: 'absolute',
                top: 0,
                left: 0,
                width: '100%',
                height: '100%',
                zIndex: 1,
                pointerEvents: 'none',
            };

            return (
                <section className="relative min-h-screen flex items-center justify-center overflow-hidden pt-28 pb-16">
                    {/* الخلفية المتحركة (الأشكال) */}
                    <div className="bg-shapes">
                        <div className="shape"></div>
                        <div className="shape"></div>
                        <div className="shape"></div>
                    </div>

                    {/* طبقة العلامة المائية للشعار */}
                    <div style={watermarkStyle}></div>

                    {/* المحتوى النصي */}
                    <div className="container mx-auto px-4 md:px-8 text-center relative z-10">
                        <div className="inline-block mb-4 px-5 py-1.5 rounded-full border border-[#fbbf24]/30 bg-[#fbbf24]/10 text-[#fbbf24] text-sm font-semibold backdrop-blur-sm">
                            🏆 بقيادة السيد / جميل جمال شمسان
                        </div>
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-black leading-tight mb-6">
                            <span className="text-white">نحول </span>
                            <span className="text-gradient">رؤاك الاستثمارية</span>
                            <br />
                            <span className="text-white">إلى </span>
                            <span className="text-[#38bdf8]">واقع ملموس</span>
                        </h1>
                        <p className="text-lg md:text-xl text-[#94a3b8] max-w-3xl mx-auto mb-10 leading-relaxed">
                            شركة ذكاء النسور للاستثمار بقيادة رئيس مجلس الإدارة <strong className="text-white">جميل جمال شمسان</strong>،
                            تقدم حلولاً متكاملة في تأسيس الشركات، الاستشارات المالية، إدارة الأصول، والحوكمة لضمان ريادتك في الأسواق.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <button className="btn-gold text-lg px-10 py-4">ابدأ رحلتك الآن</button>
                            <button className="border border-[#fbbf24] text-[#fbbf24] hover:bg-[#fbbf24] hover:text-[#0b1120] transition-all duration-300 px-10 py-4 rounded-full text-lg font-semibold backdrop-blur-sm">
                                اكتشف خدماتنا
                            </button>
                        </div>
                    </div>
                </section>
            );
        }

        // ----- 3. قسم الإحصائيات (Stats) -----
        function Stats() {
            const [counts, setCounts] = useState({ projects: 0, clients: 0, offices: 0, awards: 0 });
            const statsRef = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) animateCounts(); });
                }, { threshold: 0.3 });
                if (statsRef.current) observer.observe(statsRef.current);
                return () => observer.disconnect();
            }, []);
            const animateCounts = () => {
                const targets = { projects: 1250, clients: 870, offices: 15, awards: 42 };
                const duration = 2000,
                    steps = 60;
                let step = 0;
                const interval = duration / steps;
                const timer = setInterval(() => {
                    step++;
                    const progress = step / steps;
                    setCounts({
                        projects: Math.round(progress * targets.projects),
                        clients: Math.round(progress * targets.clients),
                        offices: Math.round(progress * targets.offices),
                        awards: Math.round(progress * targets.awards),
                    });
                    if (step >= steps) { clearInterval(timer);
                        setCounts(targets); }
                }, interval);
            };
            return (
                <section ref={statsRef} className="py-20 bg-[#0f172a] border-y border-[#fbbf24]/10">
                    <div className="container mx-auto px-4 md:px-8 grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                        {[
                            { label: 'مشروع منجز', value: counts.projects, color: 'text-[#fbbf24]' },
                            { label: 'عميل راضٍ', value: counts.clients, color: 'text-[#38bdf8]' },
                            { label: 'مكتب حول العالم', value: counts.offices, color: 'text-[#a78bfa]' },
                            { label: 'جائزة عالمية', value: counts.awards, color: 'text-[#34d399]' }
                        ].map((item, i) => (
                            <div key={i} className="p-6 rounded-2xl bg-gradient-to-b from-[#1e293b]/50 to-transparent border border-[#fbbf24]/10">
                                <h3 className={`text-4xl md:text-5xl font-black ${item.color}`}>{item.value}+</h3>
                                <p className="text-[#94a3b8] mt-2 font-semibold">{item.label}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        // ----- 4. قسم "من نحن" (About) مع ذكر الرئيس -----
        function About() {
            return (
                <section id="about" className="py-24 relative">
                    <div className="container mx-auto px-4 md:px-8">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                            <div className="fade-section order-2 lg:order-1">
                                <span className="text-[#fbbf24] font-bold text-sm tracking-wider">من نحن</span>
                                <h2 className="text-3xl md:text-5xl font-black mb-6 leading-tight">
                                    <span className="text-white">شركة </span>
                                    <span className="text-gradient">ذكاء النسور</span>
                                    <span className="text-white block">للريادة والاستثمار</span>
                                </h2>
                                <p className="text-[#94a3b8] text-lg leading-relaxed mb-4">
                                    تأسست شركة ذكاء النسور للاستثمار على يد نخبة من الخبراء في المجال المالي والإداري،
                                    وتتولى قيادتها حاليًا <strong className="text-white">السيد جميل جمال شمسان</strong>،
                                    الذي يمتلك رؤية ثاقبة في تطوير الأعمال وتحقيق أعلى عوائد الاستثمار لعملائنا.
                                </p>
                                <p className="text-[#94a3b8] text-lg leading-relaxed">
                                    نؤمن بأن النجاح الحقيقي يبدأ من الشريك الاستراتيجي، ونعمل وفق أعلى معايير الحوكمة والشفافية
                                    لنكون الخيار الأول لرواد الأعمال في الشرق الأوسط.
                                </p>
                                <div className="mt-8 flex items-center gap-6">
                                    <div className="w-16 h-0.5 bg-[#fbbf24]"></div>
                                    <span className="text-[#fbbf24] font-semibold">١٥ عاماً من التميز</span>
                                </div>
                            </div>
                            <div className="order-1 lg:order-2 flex justify-center fade-section">
                                <div className="relative w-full max-w-sm aspect-square rounded-3xl overflow-hidden border-2 border-[#fbbf24]/20 shadow-2xl shadow-[#fbbf24]/10">
                                    {/* صورة الرئيس التنفيذي أو مقر الشركة (ضع رابط صورتك) */}
                                    <div className="w-full h-full bg-gradient-to-br from-[#1e293b] to-[#0f172a] flex items-center justify-center flex-col text-center p-6">
                                        <div className="w-32 h-32 rounded-full bg-[#fbbf24]/20 border-4 border-[#fbbf24] flex items-center justify-center text-6xl mb-4">
                                            👨‍💼
                                        </div>
                                        <h3 className="text-2xl font-bold text-white">جميل جمال شمسان</h3>
                                        <p className="text-[#fbbf24] font-semibold">رئيس مجلس الإدارة</p>
                                        <p className="text-[#94a3b8] text-sm mt-2">استثمار • قيادة • ريادة</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // ----- 5. قسم الخدمات (Services) -----
        function Services() {
            const services = [
                { icon: "🏢", title: "تأسيس الشركات", desc: "إنشاء كيانات قانونية في السعودية والخارج بأسرع الإجراءات." },
                { icon: "📊", title: "الاستشارات المالية", desc: "خطط استثمارية ذكية تعزز أرباحك وتقلل المخاطر." },
                { icon: "⚖️", title: "الحوكمة والامتثال", desc: "أنظمة حوكمة متطابقة مع المعايير العالمية." },
                { icon: "🌍", title: "التوسع الدولي", desc: "فتح أسواق جديدة وتأسيس فروع في أوروبا وآسيا." },
                { icon: "💼", title: "إدارة الأصول", desc: "إدارة محافظ بأعلى عائد وأقل مخاطرة ممكنة." },
                { icon: "📈", title: "التسويق الرقمي", desc: "استراتيجيات رقمية مبتكرة لنمو أعمالك في العالم الافتراضي." },
            ];
            return (
                <section id="services" className="py-24 bg-[#0f172a]">
                    <div className="container mx-auto px-4 md:px-8">
                        <div className="text-center mb-16 fade-section">
                            <h2 className="text-3xl md:text-5xl font-black mb-4">
                                <span className="text-white">خدماتنا </span>
                                <span className="text-gradient">الاستثنائية</span>
                            </h2>
                            <p className="text-[#94a3b8] max-w-2xl mx-auto text-lg">
                                نقدم حلولاً متكاملة تحت إشراف <strong className="text-white">جميل جمال شمسان</strong> وفريقنا الخبير.
                            </p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {services.map((s, i) => (
                                <div key={i} className="card-modern fade-section">
                                    <div className="text-5xl mb-4">{s.icon}</div>
                                    <h3 className="text-2xl font-bold text-white mb-3">{s.title}</h3>
                                    <p className="text-[#94a3b8] leading-relaxed">{s.desc}</p>
                                    <div className="mt-6 w-12 h-1 bg-gradient-to-r from-[#fbbf24] to-[#d97706] rounded-full"></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // ----- 6. قسم المشاريع (Projects) -----
        function Projects() {
            const projects = [
                { title: "مشروع البحر الأحمر", cat: "تطوير سياحي", emoji: "🏖️" },
                { title: "مدينة المعرفة", cat: "تكنولوجيا", emoji: "💻" },
                { title: "مجمع النسور السكني", cat: "عقار", emoji: "🏗️" },
            ];
            return (
                <section id="projects" className="py-24">
                    <div className="container mx-auto px-4 md:px-8">
                        <div className="text-center mb-16 fade-section">
                            <h2 className="text-3xl md:text-5xl font-black mb-4">
                                <span className="text-white">أحدث </span>
                                <span className="text-gradient">مشاريعنا</span>
                            </h2>
                            <p className="text-[#94a3b8]">نحو مستقبل استثماري مشرق</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {projects.map((p, i) => (
                                <div key={i} className="card-modern text-center fade-section">
                                    <div className="text-7xl mb-4">{p.emoji}</div>
                                    <h3 className="text-2xl font-bold text-white">{p.title}</h3>
                                    <p className="text-[#fbbf24] font-semibold">{p.cat}</p>
                                    <div className="mt-4 h-1 w-16 bg-[#fbbf24] mx-auto rounded-full"></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // ----- 7. قسم آراء العملاء (Testimonials) -----
        function Testimonials() {
            const list = [

        // ----- المكون الرئيسي (App) مع مراقبة التمرير -----
        function App() {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

                document.querySelectorAll('.fade-section').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);

            return (
                <div className="overflow-hidden">
                    <Header />
                    <Hero />
                    <Stats />
                    <About />
                    <Services />
                    <Projects />
                    <Testimonials />
                    <Blog />
                    <Contact />
                    <Footer />
                </div>
            );
        }

        // ----- تشغيل التطبيق -----
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
